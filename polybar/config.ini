[colors]
; Leemos directamente de la memoria de X (xrdb)
background = ${xrdb:color0:#282828}
background-alt = ${xrdb:color1:#3c3836}
foreground = ${xrdb:color7:#ebdbb2}
primary = ${xrdb:color4:#d79921}
secondary = ${xrdb:color2:#b16286}
alert = ${xrdb:color1:#cc241d}
disabled = ${xrdb:color8:#a89984}


[bar/minimal]
width = 100%
height = 24pt
; Bordes redondeados en las esquinas
radius = 8

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-left = 10
border-right = 10
border-top = 10
border-color = #00000000

padding-left = 1
padding-right = 1
module-margin = 1

separator = ""
separator-foreground = ${colors.disabled}

; Asegúrate de tener una fuente Nerd Font instalada para los íconos
font-0 = "JetBrainsMono Nerd Font:size=10;2"

modules-left = arch i3 obs discord steam music
modules-center = date
modules-right = pulseaudio memory temperature cpu battery

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false

label-focused = %index%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%

label-muted = 󰖁 silenciado
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 3
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = "󰻠 "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/battery]
type = internal/battery

; Cambia esto por el nombre de tu batería (puedes verlo con: ls /sys/class/power_supply/)
battery = BAT0
adapter = ADP1
full-at = 98

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>

format-full-prefix = "  "
format-full-prefix-foreground = ${colors.primary}

label-charging = %percentage%%
label-discharging = %percentage%%

ramp-capacity-0 =  
ramp-capacity-1 =  
ramp-capacity-2 =  
ramp-capacity-3 =  
ramp-capacity-4 =  
ramp-capacity-foreground = ${colors.primary}

animation-charging-0 =  
animation-charging-1 =  
animation-charging-2 =  
animation-charging-3 =  
animation-charging-4 =  
animation-charging-foreground = ${colors.primary}
animation-charging-framerate = 750


[module/temperature]
type = internal/temperature
interval = 3
thermal-zone = 0
warn-temperature = 70
units = true

format = <ramp> <label>
format-warn = <ramp> <label-warn>

label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}

ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-foreground = ${colors.primary}


[module/discord]
type = custom/script
; Busca el proceso de discord. Si existe, imprime el ícono.
exec = ps -e | grep -i discord > /dev/null && echo " " || echo ""
interval = 5
format-foreground = ${colors.primary}

[module/steam]
type = custom/script
exec = ps -e | grep -i steam > /dev/null && echo "󰓓 " || echo ""
interval = 5
format-foreground = ${colors.primary}

[module/obs]
type = custom/script
exec = ps -e | grep -i obs > /dev/null && echo "󰐌 " || echo ""
interval = 2
format-foreground = ${colors.alert}


[module/arch]
type = custom/text
content = 
format-font = 1
content-padding = 2
content-foreground = ${colors.primary}


[module/music]
type = custom/script
exec = playerctl metadata --format '{{ artist }} - {{ title }}'
interval = 2
format =   <label>
label-maxlen = 40
