#################################
#           Shadows             #
#################################
shadow = true;
shadow-radius = 10;
shadow-opacity = 0.6;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-color = "#111111";

shadow-exclude = [
  "name *= 'Dunst'",
  "QTILE_INTERNAL = 1",
  "class_g = 'Rofi'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#           Fading              #
#################################
fading = true;
fade-in-step = 0.02;
fade-out-step = 0.02;
fade-delta = 4;
no-fading-openclose = true;

#################################
#    Transparency / Opacity     #
#################################
inactive-opacity = 0.85;
frame-opacity = 1.0;
inactive-opacity-override = false;
active-opacity = 1.0;
inactive-dim = 0.0;

opacity-rule = [
  "100:fullscreen",
  "100:QTILE_INTERNAL = 1",
  "100:name *= 'Dunst'"
];

#################################
#           Corners             #
#################################
corner-radius = 10;

corner-radius-rules = [
  "0:QTILE_INTERNAL = 1" # Cambiado a 0 para que los paneles de Qtile no tengan esquinas cortadas
];

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#     Background-Blurring       #
#################################
blur-method = "dual_kawase";
blur-strength = 4;
blur-background = true;
blur-background-frame = false;
blur-background-fixed = false;
blur-kern = "3x3box";

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
#  "class_g = 'Rofi'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#       General Settings        #
#################################
backend = "glx";
dithered-present = false;
vsync = true;
mark-wmwin-focused = false;
mark-ovredir-focused = false;
detect-rounded-corners = true;
detect-client-opacity = true;
use-ewmh-active-win = true;
unredir-if-possible = true;
detect-transient = true;
use-damage = true;
log-level = "warn";

# --- GLX Optimizations ---
#glx-no-stencil = true;
#glx-no-rebind-pixmap = true;
xrender-sync-fence = true;

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.8; };
  dropdown_menu = { opacity = 0.8; };
  menu = { blur-background = false; shadow = false; };
};

#################################
#      Animation Settings       #
#################################
animations = (
  {
    triggers = ["close"];
    opacity = {
      curve = "cubic-bezier(0, 0, 1, -0.28)";
      duration = 0.2;
      start = "window-raw-opacity-before";
      end = 0.0;
    };
    blur-opacity = "opacity";
    shadow-opacity = "opacity";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height";
    scale-x = {
      curve = "cubic-bezier(0, 0, 1, -0.28)";
      duration = 0.2;
      start = 1.0;
      end = 0.5;
    };
    scale-y = "scale-x";
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  },
  {
    triggers = ["open"];
    opacity = {
      curve = "cubic-bezier(0, 1.28, 1, 1)";
      duration = 0.2;
      start = 0.0;
      end = "window-raw-opacity";
    };
    blur-opacity = "opacity";
    shadow-opacity = "opacity";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height";
    scale-x = {
      curve = "cubic-bezier(0, 1.28, 1, 1)";
      duration = 0.2;
      start = 0.5;
      end = 1.0;
    };
    scale-y = "scale-x";
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  },
  {
    triggers = ["geometry"];
    scale-x = {
      curve = "cubic-bezier(0, 1.28, 1, 1)";
      duration = 0.22;
      start = "window-width-before / window-width";
      end = 1.0;
    };
    scale-y = {
      curve = "cubic-bezier(0, 1.28, 1, 1)";
      duration = 0.22;
      start = "window-height-before / window-height";
      end = 1.0;
    };
    offset-x = {
      curve = "cubic-bezier(0, 1.28, 1, 1)";
      duration = 0.22;
      start = "window-x-before - window-x";
      end = 0.0;
    };
    offset-y = {
      curve = "cubic-bezier(0, 1.28, 1, 1)";
      duration = 0.22;
      start = "window-y-before - window-y";
      end = 0.0;
    };
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  }
);
