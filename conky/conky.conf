-- Cargar colores de pywal
local f = io.open(os.getenv("HOME") .. "/.cache/wal/colors", "r")
local colors = {}
if f then
    for line in f:lines() do
        table.insert(colors, line)
    end
    f:close()
end

conky.text = [[
${alignc}${font Anurati-Regular:size=60}${color ]] .. (colors[2] or "#ffffff") .. [[}${execi 60 date +'%A' | sed 'y/áéíóúÁÉÍÓÚ/aeiouAEIOU/' | sed 's/./& /g; s/ $//'}${color}
${voffset -60}${alignc}${font JetBrains Mono:bold:size=18}${color ]] .. (colors[3] or "#aaaaaa") .. [[}${time %d %b %Y}${color}
${voffset 5}${alignc}${font JetBrains Mono:bold:size=14}${color ]] .. (colors[4] or "#888888") .. [[}- ${time %I:%M %p} -${color}
]];
